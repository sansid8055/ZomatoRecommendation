<style>
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .animate-shimmer {
            background: linear-gradient(90deg, #f0eded 0%, #fcf9f8 50%, #f0eded 100%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }
        .ai-pulse::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            background-color: rgba(183, 18, 42, 0.1);
            border-radius: 45px;
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .floating-food {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }

<!-- BottomNavBar (Suppressed as per "focused journey" rule, but following skeleton layout) -->
<!-- The user is in a loading state which is transactional/transient. Nav is excluded to prioritize the focus. -->
<script>
        // Micro-interactions for the loading state
        const icons = ["restaurant", "local_pizza", "ramen_dining", "icecream", "bakery_dining", "coffee", "lunch_dining"];
        const iconElement = document.getElementById('spinner-icon');
        const progressBar = document.getElementById('progress-bar');
        
        let iconIndex = 0;
        let progress = 0;

        // Change the central icon periodically
        setInterval(() => {
            iconIndex = (iconIndex + 1) % icons.length;
            iconElement.style.opacity = '0';
            setTimeout(() => {
                iconElement.innerText = icons[iconIndex];
                iconElement.style.opacity = '1';
            }, 250);
        }, 1500);

        // Simulate progress bar movement
        const interval = setInterval(() => {
            if (progress >= 95) {
                // Hold at 95% until "finished"
                progress = 95;
            } else {
                // Randomly increment to feel more "real"
                progress += Math.random() * 8;
            }
            progressBar.style.width = `${progress}%`;
        }, 800);

        // Mock completion after 12 seconds
        setTimeout(() => {
            progressBar.style.width = '100%';
            // In a real app, this would trigger the content injection
        }, 12000);
    </script>
